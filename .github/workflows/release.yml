name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.95.0

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            archive: lazyterm-windows-x86_64.zip
          - name: macos-aarch64
            os: macos-latest
            archive: lazyterm-macos-aarch64.tar.gz
          - name: linux-x86_64
            os: ubuntu-latest
            archive: lazyterm-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release --locked
      - name: Sign Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_P12_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_P12_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_P12_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PASSWORD)) {
            Write-Host "Windows signing secrets are not configured; packaging unsigned binaries."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "lazyterm-signing.p12"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_P12_BASE64))

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certPath /p $env:WINDOWS_SIGNING_CERT_PASSWORD target/release/lazyterm.exe target/release/lazytermctl.exe
          & $signtool.FullName verify /pa target/release/lazyterm.exe target/release/lazytermctl.exe
          Remove-Item -LiteralPath $certPath -Force
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/lazyterm | Out-Null
          Copy-Item target/release/lazyterm.exe dist/lazyterm/
          Copy-Item target/release/lazytermctl.exe dist/lazyterm/
          Copy-Item scripts/install-windows.ps1 dist/lazyterm/
          Copy-Item README.md,LICENSE dist/lazyterm/
          Compress-Archive -Path dist/lazyterm/* -DestinationPath dist/${{ matrix.archive }} -Force
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/lazyterm
          cp target/release/lazyterm dist/lazyterm/
          cp target/release/lazytermctl dist/lazyterm/
          cp README.md LICENSE dist/lazyterm/
          tar -czf "dist/${{ matrix.archive }}" -C dist lazyterm
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release checksums
        shell: bash
        run: |
          cd dist
          sha256sum lazyterm-* > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
