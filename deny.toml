[graph]
all-features = true
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

[advisories]
ignore = [
    # Transitive through GPUI's http_client -> async-tar path.
    "RUSTSEC-2025-0052",
    # Transitive through GPUI's macOS/image stack; no direct Lazyterm use.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "bzip2-1.0.6",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = [
    # GPUI currently reaches these Zed tracing crates through sum_tree.
    # Keep the exception narrow so any new GPL dependency fails review.
    { crate = "zlog", allow = ["GPL-3.0-or-later"] },
    { crate = "ztracing", allow = ["GPL-3.0-or-later"] },
    { crate = "ztracing_macro", allow = ["GPL-3.0-or-later"] },
]

[[licenses.clarify]]
name = "gpui_shared_string"
expression = "Apache-2.0"
license-files = [{ path = "LICENSE-APACHE", hash = 0x8a8d02f6 }]

[[licenses.clarify]]
name = "gpui_util"
expression = "Apache-2.0"
license-files = [{ path = "LICENSE-APACHE", hash = 0x8a8d02f6 }]

[licenses.private]
ignore = false

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/zed-industries/font-kit",
    "https://github.com/zed-industries/zed",
]
